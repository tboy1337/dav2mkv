name: "Build-Release-PYPI"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
permissions:
  contents: write
  id-token: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Create virtual environment
        run: |
          python -m venv venv
      - name: Install build dependencies in virtual environment
        run: |
          .\venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools
          python -m pip install --upgrade wheel
          python -m pip install --upgrade pyinstaller
        shell: pwsh
      - name: Generate version info file
        run: |
          .\venv\Scripts\Activate.ps1
          python scripts/generate_file_version_info.py
        shell: pwsh
      - name: Build executable
        run: |
          .\venv\Scripts\Activate.ps1
          pyinstaller dav2mkv.spec
        shell: pwsh
      - name: Rename executable
        run: |
          Rename-Item -Path dist/dav2mkv.exe -NewName dav2mkv-v1.0.${{ github.run_number }}-windows.exe
        shell: pwsh
      - name: Zip the exe
        run: |
          Compress-Archive -Path "dist/dav2mkv-v1.0.${{ github.run_number }}-windows.exe" -DestinationPath "dist/dav2mkv-v1.0.${{ github.run_number }}-windows.zip"
        shell: pwsh
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: dist/dav2mkv-v1.0.${{ github.run_number }}-windows.zip

  build-wheels:
    name: Build Python wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools
          python -m pip install --upgrade wheel
          python -m pip install --upgrade build

      - name: Build pure Python wheel and sdist
        run: |
          python -m build

      - name: Store artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/

  create-release:
    needs: [build-windows]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Download Windows build
        uses: actions/download-artifact@v8
        with:
          name: windows-build
          path: ./build
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: ./build/dav2mkv-v1.0.${{ github.run_number }}-windows.zip
          tag: v1.0.${{ github.run_number }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          removeArtifacts: true

  publish-pypi:
    name: Publish wheels to PyPI
    needs: build-wheels
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Twine
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools
          python -m pip install --upgrade wheel
          python -m pip install --upgrade twine

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_DAV2MKV }}
        run: |
          twine check dist/*
          twine upload dist/*
